name: Morning & Noon Report Push
on:
  schedule:
    # 北京时间 9:15 = UTC 1:15，周一到周五
    - cron: '15 1 * * 1-5'
    # 北京时间 12:00 = UTC 4:00，周一到周五
    - cron: '0 4 * * 1-5'
  workflow_dispatch:

jobs:
  push_report:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests --quiet

      - name: Run Morning/Noon Push
        run: python3 scripts/morning_noon_push.py

      - name: Done
        run: echo "Report pushed at $(date)"
