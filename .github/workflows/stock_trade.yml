import requests
import json
import re
from datetime import datetime

FEISHU_WEBHOOK = "https://open.feishu.cn/open-apis/bot/v2/hook/8cb1308d-2c0e-4e16-9e7e-aafd4c970c51"

HEADERS = {'User-Agent': 'Mozilla/5.0', 'Referer': 'https://finance.eastmoney.com/'}

def get_market_indices():
    url = "https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&invt=2&ut=b2884a393a59ad64002217a3e73fc9db&fields=f12,f14,f3,f4&secids=1.000001,0.399001,0.399006,1.000300"
    resp = requests.get(url, headers=HEADERS, timeout=10)
    data = resp.json()
    return [(i['f14'], i['f4']/100) for i in data['data']['diff']]

def get_limit_stats():
    url = "https://push2.eastmoney.com/api/qt/clist/get?pn=1&pz=500&po=1&np=1&ut=bd1d9ddb04089700cf9c27f6f7426281&fltt=2&invt=2&fields=f12,f14&fs=m:0+t:6,m:0+t:80,m:1+t:2,m:1+t:23"
    resp = requests.get(url, headers=HEADERS, timeout=10)
    text = resp.text
    up = len(re.findall(r'"f12":"(\d+)".*?"f14":"([^"]+)"', text))
    return up

def get_daily_kline(code, days=5):
    market = '1' if code.startswith(('6', '5')) else '0'
    url = f"https://push2his.eastmoney.com/api/qt/stock/kline/get?secid={market}.{code}&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55&klt=101&fqt=1&end=20500101&lmt={days}"
    resp = requests.get(url, headers=HEADERS, timeout=10)
    data = resp.json()
    if data.get('data') and data['data'].get('klines'):
        return data['data']['klines']
    return []

