name: V4.3.1 Stock Assistant
on:
  schedule:
    - cron: '*/5 1-3 * * 1-5'
    - cron: '*/5 5-6 * * 1-5'
  workflow_dispatch:

jobs:
  run_strategy:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    
    steps:
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install requests --quiet
      
      - name: Run V4.3.1 Strategy
        run: python3 << 'PYEOF'
import requests
import json
import time
import re
from datetime import datetime

FEISHU_WEBHOOK = "https://open.feishu.cn/open-apis/bot/v2/hook/8cb1308d-2c0e-4e16-9e7e-aafd4c970c51"
PORTFOLIO_FILE = "portfolio_data.json"

HEADERS = {
    'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
    'Referer': 'https://finance.eastmoney.com/',
    'Accept': 'application/json',
}

def get_realtime_quotes(codes):
    if not codes:
        return {}
    secids = ','.join(codes)
    url = f"https://push2.eastmoney.com/api/qt/ulist.np/get?fltt=2&invt=2&ut=b2884a393a59ad64002217a3e73fc9db&fields=f12,f14,f3,f4,f5,f6,f7,f8,f15,f16,f17,f18&secids={secids}"
    try:
        resp = requests.get(url, headers=HEADERS, timeout=10)
        data = resp.json()
        result = {}
        if data.get('data') and data['data'].get('diff'):
            for item in data['data']['diff']:
                result[item['f12']] = {
                    'code': item['f12'], 'name': item['f14'],
                    'price': item['f3'], 'change_pct': item['f4'] / 100 if item.get('f4') else 0,
                    'volume': item['f5'], 'amount': item['f6'],
                    'high': item['f15'], 'low': item['f16'],
                    'open': item['f17'], 'pre_close': item['f18']
                }
        return result
    except:
        return {}

def get_market_indices():
    return get_realtime_quotes(['1.000001', '0.399001', '0.399006', '1.000300'])

def get_limit_up_stocks():
    url = "https://push2.eastmoney.com/api/qt/clist/get?pn=1&pz=100&po=1&np=1&ut=bd1d9ddb04089700cf9c27f6f7426281&fltt=2&invt=2&fields=f12,f14&fs=m:0+t:6,m:0+t:80,m:1+t:2,m:1+t:23"
    try:
        resp = requests.get(url, headers=HEADERS, timeout=10)
        matches = re.findall(r'"f12":"(\d+)".*?"f14":"([^"]+)"', resp.text)
        return [{'code': m[0], 'name': m[1]} for m in matches if not m[1].startswith('ST')]
    except:
        return []

def calculate_market_score():
    score = 0
    reasons = []
    indices = get_market_indices()
    
    if not indices:
        return 0, ["Failed to get data"]
    
    green_count = sum(1 for i in indices.values() if i['change_pct'] > 0)
    if green_count >= 3:
        score += 2
        reasons.append("All indices up")
    elif green_count >= 1:
        score += 1
        reasons.append("Some indices up")
    else:
        reasons.append("All indices down")
    
    limit_up = get_limit_up_stocks()
    cnt = len(limit_up)
    if cnt >= 50:
        score += 2
        reasons.append(f"Limit up: {cnt}")
    elif cnt >= 30:
        score += 1
        reasons.append(f"Limit up: {cnt}")
    else:
        reasons.append(f"Limit up: {cnt}")
    
    sz = indices.get('399006', {})
    if sz.get('change_pct', 0) > 0.5:
        score += 1
        reasons.append("Market active")
    
    score += 1
    reasons.append("Limit down normal")
    
    if cnt >= 20:
        score += 1
        reasons.append("Sector effect")
    
    return score, reasons

def check_hard_filter(code, quote):
    price = quote.get('price', 0)
    if price < 5 or price > 20:
        return False, f"Price {price} out of range"
    if 'ST' in quote.get('name', ''):
        return False, "ST stock"
    if abs(quote.get('change_pct', 0)) >= 9.9:
        return False, "Limit up/down"
    amount = quote.get('amount', 0)
    if amount < 300000000:
        return False, "Insufficient volume"
    return True, "Pass"

def get_entry_zone(code, quote):
    price = quote.get('price', 0)
    market = '1' if code.startswith(('6', '5')) else '0'
    url = f"https://push2his.eastmoney.com/api/qt/stock/kline/get?secid={market}.{code}&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55&klt=101&fqt=1&end=20500101&lmt=20"
    try:
        resp = requests.get(url, headers=HEADERS, timeout=10)
        data = resp.json()
        if data.get('data') and data['data'].get('klines'):
            closes = [float(k.split(',')[2]) for k in data['data']['klines'][-10:]]
            ma10 = sum(closes) / len(closes)
            ideal = min(price, ma10)
            return round(ideal * 0.98, 2), round(ideal * 1.01, 2)
    except:
        pass
    return round(price * 0.97, 2), round(price * 1.01, 2)

def send_to_feishu(message):
    payload = {"msg_type": "text", "content": {"text": message}}
    try:
        requests.post(FEISHU_WEBHOOK, json=payload, timeout=10)
    except Exception as e:
        print(f"Push failed: {e}")

def build_market_report():
    score, reasons = calculate_market_score()
    indices = get_market_indices()
    text = "Market Score V4.3.1\n\n"
    
    for code, data in indices.items():
        pct = data['change_pct']
        emoji = "+" if pct > 0 else "-"
        text += f"{emoji} {data['name']}: {pct:+.2f}%\n"
    
    text += f"\nScore: {score}/7\n"
    text += "\n".join(reasons)
    text += f"\n{'CAN OPEN' if score >= 4 else 'WAIT'}\n"
    text += f"Time: {datetime.now().strftime('%H:%M:%S')}"
    return text

def build_scan_report():
    limit_up = get_limit_up_stocks()
    if not limit_up:
        return "Today: No candidates"
    
    candidates = []
    for stock in limit_up[:20]:
        code = stock['code']
        quote = get_realtime_quotes([code]).get(code, {})
        if not quote:
            continue
        passed, _ = check_hard_filter(code, quote)
        if not passed:
            continue
        zone_low, zone_high = get_entry_zone(code, quote)
        candidates.append({
            'name': stock['name'],
            'code': code,
            'price': quote.get('price'),
            'pct': quote.get('change_pct'),
            'zone_low': zone_low,
            'zone_high': zone_high
        })
    
    if not candidates:
        return "Today: No qualified candidates"
    
    text = "Today Candidates V4.3.1\n\n"
    for i, c in enumerate(candidates[:5], 1):
        text += f"{i}. {c['name']}({c['code']})\n"
        text += f"   Price: {c['price']:.2f} ({c['pct']:+.2f}%)\n"
        text += f"   Zone: {c['zone_low']:.2f} ~ {c['zone_high']:.2f}\n\n"
    return text

def build_monitor_report():
    try:
        with open(PORTFOLIO_FILE, 'r') as f:
            portfolio = json.load(f)
    except:
        return "Position: No holdings"
    
    positions = portfolio.get('positions', [])
    if not positions:
        return "Position: No holdings"
    
    text = "Position Monitor V4.3.1\n\n"
    for pos in positions:
        code = pos['code']
        quote = get_realtime_quotes([code]).get(code, {})
        if not quote:
            continue
        entry = pos['entry_price']
        current = quote.get('price', entry)
        profit = (current - entry) / entry * 100
        text += f"{pos['name']}({code})\n"
        text += f"   Entry: {entry:.2f} -> Current: {current:.2f}\n"
        text += f"   P/L: {profit:+.1f}%\n\n"
    return text

def main():
    parts = [build_market_report()]
    
    now = datetime.now()
    if 9 <= now.hour <= 14:
        parts.append(build_scan_report())
    
    parts.append(build_monitor_report())
    
    message = "\n\n".join(parts)
    send_to_feishu(message)
    print("Done!")

if __name__ == "__main__":
    main()
PYEOF

      - name: Done
        run: echo "Workflow completed"
